spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: redis
      port: 6379

  rabbitmq:
    host: ${RABBIT_HOST}
    port: ${RABBIT_PORT}
    username: ${RABBIT_USERNAME}
    password: ${RABBIT_PASSWORD}

  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat:
          options:
            model: gemini-2.5-flash
            temperature: 0.2
            max-tokens: 512
    mcp:
      server:
        enabled: true
        name: aegis-mcp-server
        version: 1.0.0

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    io.github.resilience4j: DEBUG
    org.springframework.amqp: DEBUG

ai:
  rag:
    daily-limit: ${AI_RAG_DAILY_LIMIT:50}
  agent:
    schedule: ${AI_AGENT_SCHEDULE:0 0 * * * *}
    quota-warning-threshold: 0.8
    rate-breach-threshold: 10